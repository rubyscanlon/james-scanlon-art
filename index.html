<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Scanlon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0e0e0c;
            --text: #f0ece4;
            --dim: #5a5549;
            --accent: #c9a882;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ---- HERO ---- */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            will-change: opacity, transform;
        }

        .artist-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(3.2rem, 11vw, 10rem);
            line-height: 0.92;
            letter-spacing: -0.03em;
            color: var(--text);
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: heroIn 1s ease 0.2s forwards;
        }

        .location {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--dim);
            margin-top: 1.5rem;
            opacity: 0;
            animation: heroIn 1s ease 0.6s forwards;
        }

        .scroll-cta {
            position: absolute;
            bottom: 3rem;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            opacity: 0;
            animation: heroIn 1s ease 1.2s forwards;
            cursor: pointer;
        }

        .scroll-cta span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--dim);
            transition: color 0.3s;
        }
        .scroll-cta:hover span { color: var(--text); }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 1px solid var(--dim);
            border-bottom: 1px solid var(--dim);
            transform: rotate(45deg);
            animation: bobDown 2s ease-in-out infinite;
            transition: border-color 0.3s;
        }
        .scroll-cta:hover .scroll-arrow { border-color: var(--text); }

        @keyframes bobDown {
            0%, 100% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(5px); }
        }
        @keyframes heroIn { to { opacity: 1; transform: translateY(0); } }

        .divider {
            width: 1px; height: 0; background: var(--dim);
            margin: 0 auto; opacity: 0;
            transition: height 1s ease, opacity 1s ease;
        }
        .divider.visible { height: 60px; opacity: 0.4; }

        /* ---- GALLERY (original masonry) ---- */
        .gallery {
            column-count: 2;
            column-gap: 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .gallery-item img.loaded {
            opacity: 1;
        }

        .gallery-item:hover img.loaded {
            transform: scale(1.005);
            transition: transform 3s ease;
        }

        /* Tier 1 — hero pieces: more space + slightly larger */
        .tier1 {
            margin-bottom: 3.5rem;
            margin-top: 2rem;
            transform: scale(1.03);
            transform-origin: center;
            z-index: 1;
            position: relative;
        }

        /* Tier 2 — supporting pieces: a bit more space */
        .tier2 {
            margin-bottom: 3rem;
            margin-top: 1.5rem;
            transform: scale(1.015);
            transform-origin: center;
            z-index: 1;
            position: relative;
        }

        /* ---- LIGHTBOX ---- */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(5,5,4,0.97);
            justify-content: center;
            align-items: center;
            padding: 3rem;
            cursor: zoom-out;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }
        .lightbox.active { display: flex; animation: lbIn 0.25s ease; }
        @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }

        .lightbox img {
            max-width: 94vw;
            max-height: 92vh;
            object-fit: contain;
            user-select: none;
        }

        .lb-close {
            position: absolute; top: 1.2rem; right: 1.5rem;
            border: none; background: none; color: var(--dim);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem; letter-spacing: 0.25em;
            text-transform: uppercase; cursor: pointer;
            transition: color 0.2s; padding: 0.5rem; z-index: 1001;
        }
        .lb-close:hover { color: var(--text); }

        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            border: none; background: none; color: var(--dim);
            font-size: 2rem; cursor: pointer;
            transition: color 0.2s; z-index: 1001; padding: 1rem;
        }
        .lb-nav:hover { color: var(--text); }
        .lb-prev { left: 0.5rem; }
        .lb-next { right: 0.5rem; }

        .lb-counter {
            position: absolute; bottom: 1.2rem; left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem; letter-spacing: 0.2em;
            color: var(--dim); z-index: 1001;
        }

        /* ---- FOOTER ---- */
        footer { text-align: center; padding: 2.5rem 2rem 2rem; }
        footer p {
            font-family: 'Syne', sans-serif; font-weight: 600;
            font-size: 0.7rem; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--dim);
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .gallery { column-count: 1; padding: 2rem 1rem; }
            .gallery-item { margin-bottom: 2rem; }
            header { height: 85vh; }
            .lb-nav { display: none; }
        }

        @media (min-width: 1100px) {
            .gallery { column-count: 3; }
        }

        ::selection { background: var(--accent); color: var(--bg); }
    </style>
</head>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" aria-label="Close">Close</button>
        <button class="lb-nav lb-prev" aria-label="Previous">&#8249;</button>
        <button class="lb-nav lb-next" aria-label="Next">&#8250;</button>
        <img src="" alt="Painting by James Scanlon" id="lb-img">
        <div class="lb-counter" id="lb-counter"></div>
    </div>

    <footer>
        <p>&copy; James Scanlon</p>
    </footer>

    <script>
        // Scroll CTA
        document.getElementById('scrollCta').addEventListener('click', () => {
            document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' });
        });

        // Divider
        const divider = document.getElementById('divider');
        new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) divider.classList.add('visible'); });
        }, { threshold: 0.5 }).observe(divider);

        // Parallax header fade
        const header = document.querySelector('header');
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const p = Math.min(window.scrollY / (header.offsetHeight * 0.5), 1);
                    header.style.opacity = 1 - p;
                    header.style.transform = `translateY(${window.scrollY * 0.3}px)`;
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Fade-in on scroll
        const fadeObs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target.querySelector('img');
                    if (img.complete) img.classList.add('loaded');
                    else img.addEventListener('load', () => img.classList.add('loaded'));
                    fadeObs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05, rootMargin: '100px' });

        document.querySelectorAll('.gallery-item').forEach(item => fadeObs.observe(item));
        document.querySelectorAll('.gallery-item img').forEach(img => {
            if (img.complete) img.classList.add('loaded');
        });

        // Lightbox
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCounter = document.getElementById('lb-counter');
        const imgs = Array.from(document.querySelectorAll('.gallery-item img'));
        let idx = 0;

        function openLb(i) {
            idx = i;
            lbImg.src = imgs[i].src;
            lbCounter.textContent = (i + 1) + ' / ' + imgs.length;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLb() { lb.classList.remove('active'); document.body.style.overflow = ''; }
        function navLb(d) {
            idx = (idx + d + imgs.length) % imgs.length;
            lbImg.src = imgs[idx].src;
            lbCounter.textContent = (idx + 1) + ' / ' + imgs.length;
        }

        imgs.forEach((img, i) => img.parentElement.addEventListener('click', () => openLb(i)));
        lb.addEventListener('click', (e) => { if (e.target === lb || e.target === lbImg) closeLb(); });
        document.querySelector('.lb-close').addEventListener('click', closeLb);
        document.querySelector('.lb-prev').addEventListener('click', (e) => { e.stopPropagation(); navLb(-1); });
        document.querySelector('.lb-next').addEventListener('click', (e) => { e.stopPropagation(); navLb(1); });

        document.addEventListener('keydown', (e) => {
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowLeft') navLb(-1);
            if (e.key === 'ArrowRight') navLb(1);
        });

        let tx = 0;
        lb.addEventListener('touchstart', (e) => { tx = e.touches[0].clientX; });
        lb.addEventListener('touchend', (e) => {
            const d = tx - e.changedTouches[0].clientX;
            if (Math.abs(d) > 50) navLb(d > 0 ? 1 : -1);
        });
    </script>
